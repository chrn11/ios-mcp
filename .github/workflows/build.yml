name: Build iOS MCP

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    strategy:
      fail-fast: false
      matrix:
        include:
          - scheme_var: ""
            artifact_name: rootful
          - scheme_var: "THEOS_PACKAGE_SCHEME=rootless"
            artifact_name: rootless

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install dependencies
        run: |
          brew install ldid make dpkg
          echo "$(brew --prefix make)/libexec/gnubin" >> $GITHUB_PATH

      - name: Install Theos
        uses: Randomblock1/theos-action@v1

      - name: Install libroothide headers for Theos
        run: |
          mkdir -p $THEOS/include/roothide
          mkdir -p $THEOS/lib
          # Download roothide SDK from GitHub releases
          curl -fsSL https://github.com/roothide/libroothide/releases/latest/download/roothide-theos.zip -o /tmp/roothide-theos.zip
          unzip -o /tmp/roothide-theos.zip -d /tmp/roothide-theos
          cp -r /tmp/roothide-theos/include/roothide/* $THEOS/include/roothide/ 2>/dev/null || true
          cp /tmp/roothide-theos/include/roothide.h $THEOS/include/ 2>/dev/null || true
          cp /tmp/roothide-theos/lib/libroothide.dylib $THEOS/lib/ 2>/dev/null || true
          # Fallback: download individual header files if zip structure differs
          curl -fsSL https://raw.githubusercontent.com/roothide/libroothide/main/roothide-theos.h -o $THEOS/include/roothide-theos.h 2>/dev/null || true
          curl -fsSL https://raw.githubusercontent.com/roothide/libroothide/main/stub.h -o $THEOS/include/roothide/stub.h 2>/dev/null || true
          curl -fsSL https://raw.githubusercontent.com/roothide/libroothide/main/roothide.h -o $THEOS/include/roothide/roothide.h 2>/dev/null || true
          echo "=== roothide include files ==="
          ls -la $THEOS/include/roothide/ 2>/dev/null || echo "WARNING: roothide include dir not found"

      - name: Copy vendored libraries to Theos
        run: |
          cp third_party/procursus-sdk/iphoneos-arm64/usr/lib/libcrypto.a $THEOS/lib/ 2>/dev/null || true
          cp third_party/procursus-sdk/iphoneos-arm64/usr/lib/libplist-2.0.a $THEOS/lib/ 2>/dev/null || true
          echo "=== Theos lib ==="
          ls -la $THEOS/lib/lib*.a 2>/dev/null || true

      - name: Build AppSync subprojects
        working-directory: AppSync
        run: make ${{ matrix.scheme_var }}

      - name: Build mcp-appinst
        working-directory: AppSync/appinst
        run: make ${{ matrix.scheme_var }}

      - name: Build mcp-root
        working-directory: mcp-root
        run: make ${{ matrix.scheme_var }}

      - name: Build mcp-roothelper
        working-directory: mcp-roothelper
        run: make ${{ matrix.scheme_var }}

      - name: Build mcp-ldid
        working-directory: mcp-ldid
        run: make ${{ matrix.scheme_var }}

      - name: Build ios-mcp package
        run: |
          make clean
          make package ${{ matrix.scheme_var }}

      - name: Upload deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-mcp-${{ matrix.artifact_name }}
          path: |
            packages/*.deb
          if-no-files-found: error