name: Build iOS MCP

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    strategy:
      fail-fast: false
      matrix:
        include:
          - scheme_var: ""
            artifact_name: rootful
          - scheme_var: "THEOS_PACKAGE_SCHEME=rootless"
            artifact_name: rootless
          - scheme_var: "THEOS_PACKAGE_SCHEME=roothide"
            artifact_name: roothide

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install dependencies
        run: |
          brew install ldid make dpkg cmake
          echo "$(brew --prefix make)/libexec/gnubin" >> $GITHUB_PATH

      - name: Install Theos
        uses: Randomblock1/theos-action@v1

      - name: Patch Theos for roothide support
        run: |
          # Roothide uses same binary layout as rootless (/var/jb prefix)
          # Create roothide module dir so Theos accepts the scheme
          mkdir -p "$THEOS_MODULE_PATH/roothide"
          echo "Patched Theos for roothide scheme support"

      - name: Install libroothide and libzip for Theos
        run: |
          set -e
          THEOS_INC="$THEOS/include"
          THEOS_LIB="$THEOS/lib"
          SDK_PATH=$(xcrun --sdk iphoneos --show-sdk-path)
          
          echo "=== Installing libroothide headers ==="
          mkdir -p "$THEOS_INC/roothide"
          mkdir -p "$THEOS_LIB"
          git clone --depth=1 https://github.com/roothide/libroothide.git /tmp/libroothide
          cp /tmp/libroothide/roothide-theos.h "$THEOS_INC/roothide-theos.h"
          cp /tmp/libroothide/stub.h "$THEOS_INC/roothide/stub.h"
          cp /tmp/libroothide/roothide.h "$THEOS_INC/roothide/roothide.h"
          for f in /tmp/libroothide/*.h; do cp "$f" "$THEOS_INC/roothide/"; done
          # Top-level roothide.h using stub (compatible with rootful/rootless)
          printf '%s\n' '#ifndef ROOTHIDE_H_GUARD' '#define ROOTHIDE_H_GUARD' '#include <roothide/stub.h>' '#endif' > "$THEOS_INC/roothide.h"
          # Build libroothide stub
          cat > /tmp/roothide_stub.c << 'STUBEOF'
          #include <stdlib.h>
          #include <string.h>
          const char* jbroot(const char* path) { return path ? path : ""; }
          void* _jbroot_ptr = NULL;
          STUBEOF
          clang -arch arm64 -arch arm64e -isysroot "$SDK_PATH" -miphoneos-version-min=13.0 -c /tmp/roothide_stub.c -o /tmp/roothide_stub.o
          ar rcs "$THEOS_LIB/libroothide.a" /tmp/roothide_stub.o
          
          echo "=== Building libzip from source ==="
          curl -fsSL https://libzip.org/download/libzip-1.10.1.tar.gz -o /tmp/libzip.tar.gz
          tar xzf /tmp/libzip.tar.gz -C /tmp
          cd /tmp/libzip-1.10.1
          mkdir build && cd build
          cmake .. \
            -DCMAKE_SYSTEM_NAME=iOS \
            -DCMAKE_OSX_ARCHITECTURES="arm64;arm64e" \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=13.0 \
            -DCMAKE_C_FLAGS="-isysroot $SDK_PATH -miphoneos-version-min=13.0" \
            -DCMAKE_CXX_FLAGS="-isysroot $SDK_PATH -miphoneos-version-min=13.0" \
            -DBUILD_SHARED_LIBS=OFF \
            -DBUILD_TOOLS=OFF \
            -DENABLE_BZIP2=OFF \
            -DENABLE_LZMA=OFF \
            -DENABLE_ZSTD=OFF \
            -DENABLE_GNUTLS=OFF \
            -DENABLE_OPENSSL=OFF \
            -DCMAKE_INSTALL_PREFIX=/tmp/libzip-install
          make -j$(sysctl -n hw.ncpu)
          cp lib/libzip.a "$THEOS_LIB/libzip.a"
          
          echo "=== Copying vendored libraries ==="
          cp "$GITHUB_WORKSPACE/third_party/procursus-sdk/iphoneos-arm64/usr/lib/libcrypto.a" "$THEOS_LIB/"
          cp "$GITHUB_WORKSPACE/third_party/procursus-sdk/iphoneos-arm64/usr/lib/libplist-2.0.a" "$THEOS_LIB/"
          
          echo "=== Theos lib ==="
          ls -la "$THEOS_LIB"/lib*.a
          echo "=== roothide headers ==="
          ls -la "$THEOS_INC/roothide/"

      - name: Build AppSync subprojects
        working-directory: AppSync
        run: make ${{ matrix.scheme_var }}

      - name: Build mcp-appinst
        working-directory: AppSync/appinst
        run: make ${{ matrix.scheme_var }}

      - name: Build mcp-root
        working-directory: mcp-root
        run: make ${{ matrix.scheme_var }}

      - name: Build mcp-roothelper
        working-directory: mcp-roothelper
        run: make ${{ matrix.scheme_var }}

      - name: Build mcp-ldid
        working-directory: mcp-ldid
        run: make ${{ matrix.scheme_var }}

      - name: Build ios-mcp package
        run: |
          make clean
          make package ${{ matrix.scheme_var }}

      - name: Upload deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-mcp-${{ matrix.artifact_name }}
          path: |
            packages/*.deb
          if-no-files-found: error