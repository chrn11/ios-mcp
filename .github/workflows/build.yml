name: Build iOS MCP

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    strategy:
      fail-fast: false
      matrix:
        include:
          - scheme_var: ""
            artifact_name: rootful
          - scheme_var: "THEOS_PACKAGE_SCHEME=rootless"
            artifact_name: rootless

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install dependencies
        run: |
          brew install ldid make
          echo "$(brew --prefix make)/libexec/gnubin" >> $GITHUB_PATH

      - name: Install Theos
        uses: Randomblock1/theos-action@v1

      - name: Build AppSync subprojects
        working-directory: AppSync
        run: make ${{ matrix.scheme_var }}

      - name: Build mcp-appinst
        working-directory: AppSync/appinst
        run: make ${{ matrix.scheme_var }}

      - name: Build mcp-root
        working-directory: mcp-root
        run: make ${{ matrix.scheme_var }}

      - name: Build mcp-roothelper
        working-directory: mcp-roothelper
        run: make ${{ matrix.scheme_var }}

      - name: Build mcp-ldid
        working-directory: mcp-ldid
        run: make ${{ matrix.scheme_var }}

      - name: Build ios-mcp package
        run: |
          make clean
          make package ${{ matrix.scheme_var }}

      - name: Upload deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-mcp-${{ matrix.artifact_name }}
          path: |
            packages/*.deb
          if-no-files-found: error