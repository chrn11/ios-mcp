name: Build iOS MCP

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    strategy:
      fail-fast: false
      matrix:
        include:
          - scheme_var: ""
            artifact_name: rootful
          - scheme_var: "THEOS_PACKAGE_SCHEME=rootless"
            artifact_name: rootless

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install dependencies
        run: |
          brew install ldid make dpkg
          echo "$(brew --prefix make)/libexec/gnubin" >> $GITHUB_PATH

      - name: Install Theos
        uses: Randomblock1/theos-action@v1

      - name: Install libroothide headers for Theos
        run: |
          mkdir -p $THEOS/include/roothide
          mkdir -p $THEOS/lib
          # Clone libroothide to get headers
          git clone --depth=1 https://github.com/roothide/libroothide.git /tmp/libroothide
          # Install headers - for non-roothide builds, stub.h provides jbroot() compatibility
          cp /tmp/libroothide/roothide-theos.h $THEOS/include/roothide-theos.h
          cp /tmp/libroothide/stub.h $THEOS/include/roothide/stub.h
          cp /tmp/libroothide/roothide.h $THEOS/include/roothide/roothide.h
          # Copy all header files from the repo
          for f in /tmp/libroothide/*.h; do cp "$f" $THEOS/include/roothide/; done
          # Create top-level roothide.h that includes the stub (for rootful/rootless builds)
          cat > $THEOS/include/roothide.h << 'HEADER'
          #ifndef ROOTHIDE_H_GUARD
          #define ROOTHIDE_H_GUARD
          #include <roothide/stub.h>
          #endif
          HEADER
          # Build a minimal libroothide stub library for linking (jbroot just returns path unchanged)
          cat > /tmp/roothide_stub.c << 'STUB'
          #include <stdlib.h>
          #include <string.h>
          const char* jbroot(const char* path) { return path ? path : ""; }
          void* _jbroot_ptr = NULL;
          STUB
          SDK_PATH=$(xcrun --sdk iphoneos --show-sdk-path 2>/dev/null || echo "/Applications/Xcode.app/Contents/Developer/Platforms/iPhoneOS.platform/Developer/SDKs/iPhoneOS.sdk")
          clang -arch arm64 -arch arm64e -isysroot "$SDK_PATH" -miphoneos-version-min=13.0 -c /tmp/roothide_stub.c -o /tmp/roothide_stub_arm64.o 2>/dev/null || true
          ar rcs $THEOS/lib/libroothide.a /tmp/roothide_stub_arm64.o 2>/dev/null || true
          echo "=== roothide include files ==="
          ls -la $THEOS/include/roothide/ 2>/dev/null || echo "WARNING: roothide include dir not found"
          ls -la $THEOS/include/roothide.h 2>/dev/null || echo "WARNING: roothide.h not found"
          echo "=== roothide lib files ==="
          ls -la $THEOS/lib/libroothide* 2>/dev/null || echo "WARNING: libroothide not found"

      - name: Copy vendored libraries to Theos
        run: |
          cp third_party/procursus-sdk/iphoneos-arm64/usr/lib/libcrypto.a $THEOS/lib/ 2>/dev/null || true
          cp third_party/procursus-sdk/iphoneos-arm64/usr/lib/libplist-2.0.a $THEOS/lib/ 2>/dev/null || true
          # Also need libzip.a for mcp-roothelper
          # Check if it exists in the Procursus SDK or elsewhere
          find third_party -name "libzip.a" -exec cp {} $THEOS/lib/ \; 2>/dev/null || true
          echo "=== Theos lib ==="
          ls -la $THEOS/lib/lib*.a 2>/dev/null || true

      - name: Build AppSync subprojects
        working-directory: AppSync
        run: make ${{ matrix.scheme_var }}

      - name: Build mcp-appinst
        working-directory: AppSync/appinst
        run: make ${{ matrix.scheme_var }}

      - name: Build mcp-root
        working-directory: mcp-root
        run: make ${{ matrix.scheme_var }}

      - name: Build mcp-roothelper
        working-directory: mcp-roothelper
        run: make ${{ matrix.scheme_var }}

      - name: Build mcp-ldid
        working-directory: mcp-ldid
        run: make ${{ matrix.scheme_var }}

      - name: Build ios-mcp package
        run: |
          make clean
          make package ${{ matrix.scheme_var }}

      - name: Upload deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-mcp-${{ matrix.artifact_name }}
          path: |
            packages/*.deb
          if-no-files-found: error